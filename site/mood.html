<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MOOD — FRONTALstudio</title>
<style>
:root{--blue:#3a4ff0;--black:#0a0a0a;--white:#f0f0f0;--white-pure:#fff}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;font-family:"Nimbus Sans","Nimbus Sans L","Helvetica Neue","Arial",sans-serif;background:var(--blue);color:var(--white);cursor:default}
::selection{background:var(--black);color:var(--white-pure)}

/* grain overlay */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:200px}

.wrapper{display:flex;flex-direction:column;height:100%;width:100%}

/* back button — top right */
.back-btn{
  position:fixed;
  top:1rem;
  right:1.5rem;
  z-index:100;
  background:none;
  border:1px solid rgba(255,255,255,0.25);
  color:var(--white-pure);
  font-family:inherit;
  font-size:0.5rem;
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:0.4rem 0.8rem;
  cursor:pointer;
  opacity:0.5;
  transition:opacity 0.3s;
  text-decoration:none;
}
.back-btn:hover{opacity:0.9}

/* instruction text bar */
.top-bar{
  flex-shrink:0;
  background:var(--blue);
  padding:1.8rem 2.5rem 1.2rem;
  text-align:center;
  z-index:10;
}
.top-text{
  font-size:0.85rem;
  font-weight:700;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--white-pure);
  opacity:0.65;
  line-height:1.6;
}

/* iframe area — centered with blue masking borders */
.app-frame{
  flex:1;
  position:relative;
  overflow:hidden;
  background:var(--blue);
}
.app-frame iframe{
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  border:none;
}

/* blue overlay borders to mask dark iframe edges */
.mask-top,.mask-bottom,.mask-left,.mask-right{
  position:absolute;
  background:var(--blue);
  z-index:2;
  pointer-events:none;
}
.mask-top{top:0;left:0;right:0;height:28px}
.mask-bottom{bottom:0;left:0;right:0;height:10px}
.mask-left{top:0;bottom:0;left:0;width:10px}
.mask-right{top:0;bottom:0;right:0;width:10px}

/* mobile */
@media(max-width:768px){
  .top-bar{padding:1.2rem 1.2rem 0.8rem}
  .top-text{font-size:0.65rem;letter-spacing:0.12em}
}
@media(max-width:480px){
  .top-bar{padding:1rem 1rem 0.6rem}
  .top-text{font-size:0.5rem;letter-spacing:0.08em}
}
</style>
</head>
<body>
<a class="back-btn" href="index.html">BACK</a>
<div class="wrapper">
  <div class="top-bar">
    <div class="top-text">Double click to connect. Drag and drop the black hole to resonate with a vibe. Enjoy the infinite music.</div>
  </div>
  <div class="app-frame">
    <iframe src="https://ornate-torte-4065ce.netlify.app/"
      allow="autoplay; microphone; camera; xr-spatial-tracking"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"></iframe>
    <!-- blue masks to cover dark iframe edges -->
    <div class="mask-top"></div>
    <div class="mask-bottom"></div>
    <div class="mask-left"></div>
    <div class="mask-right"></div>
  </div>
</div>
</body>
</html>
