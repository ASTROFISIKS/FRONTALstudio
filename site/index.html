<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FRONTALstudio</title>
<style>
  :root {
    --blue: #3a4ff0;
    --black: #0a0a0a;
    --white: #f0f0f0;
    --white-pure: #ffffff;
    --grey: #6a6a6a;
    --grey-light: #b0b0b0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Nimbus Sans', 'Nimbus Sans L', 'Helvetica Neue', 'Arial', sans-serif;
    background: var(--black);
    color: var(--white);
    cursor: default;
  }

  ::selection {
    background: var(--blue);
    color: var(--white-pure);
  }

  /* Grain */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
  }

  /* ===================== LAYOUT ===================== */
  .desktop {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ===================== BLUE PANEL ===================== */
  .blue-panel {
    background: var(--blue);
    flex: 0 0 72%;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 2rem 1rem;
  }

  .hero-title {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: -0.09em;
    line-height: 0.85;
    color: var(--white-pure);
  }

  /* Lang switch — top right of blue panel */
  .lang-switch {
    position: absolute;
    top: 1.2rem;
    right: 2rem;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    z-index: 10;
  }

  .lang-switch button {
    background: none;
    border: none;
    color: var(--white-pure);
    font-family: inherit;
    font-size: 0.5rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0.15;
    transition: opacity 0.3s ease;
    padding: 0;
    font-weight: 500;
  }

  .lang-switch button.active { opacity: 0.55; }
  .lang-switch button:hover { opacity: 0.4; }

  .lang-sep {
    color: var(--white-pure);
    opacity: 0.08;
    font-size: 0.4rem;
    user-select: none;
  }

  /* ===================== TAGLINE BAR ===================== */
  .tagline-bar {
    background: var(--black);
    padding: 0.8rem 2rem;
    flex-shrink: 0;
  }

  .tagline-text {
    font-size: 0.65rem;
    font-weight: 900;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.50;
  }

  /* ===================== DESKTOP AREA ===================== */
  .desktop-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* ===================== FOLDER ===================== */
  .folder {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s ease;
    z-index: 5;
  }

  .folder:hover {
    transform: scale(1.04);
  }

  .folder:active {
    transform: scale(0.97);
  }

  .folder-icon {
    width: 52px;
    height: 44px;
    position: relative;
  }

  /* Folder SVG shape */
  .folder-icon svg {
    width: 100%;
    height: 100%;
  }

  .folder-label {
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--white);
    opacity: 0.7;
    text-align: center;
    white-space: nowrap;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
  }

  /* Folder selected state */
  .folder.selected .folder-label {
    background: var(--blue);
    color: var(--white-pure);
    opacity: 1;
    padding: 0.1rem 0.3rem;
    margin: -0.1rem -0.3rem;
  }

  /* ===================== FOLDER POSITIONS ===================== */
  /* Random-ish desktop placement */
  .folder--studio {
    left: 5%;
    top: 15%;
  }

  .folder--contact {
    left: 28%;
    top: 35%;
  }

  .folder--mood {
    right: 12%;
    top: 10%;
  }

  .folder--archief {
    right: 35%;
    top: 45%;
  }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 768px) {
    .blue-panel {
      flex: 0 0 60%;
      padding: 0 1.5rem 0.8rem;
    }

    .hero-title {
      font-size: clamp(2rem, 10vw, 3rem);
    }

    .tagline-bar {
      padding: 0.6rem 1.5rem;
    }

    .tagline-text {
      font-size: 0.55rem;
    }

    .folder-icon {
      width: 44px;
      height: 37px;
    }

    .folder-label {
      font-size: 0.5rem;
    }

    .folder--studio {
      left: 8%;
      top: 12%;
    }

    .folder--contact {
      left: 45%;
      top: 40%;
    }

    .folder--mood {
      right: 8%;
      top: 8%;
    }

    .folder--archief {
      right: 30%;
      top: 55%;
    }
  }

  @media (max-width: 480px) {
    .blue-panel {
      flex: 0 0 55%;
    }

    .hero-title {
      font-size: 2rem;
    }

    .folder--studio {
      left: 6%;
      top: 10%;
    }

    .folder--contact {
      left: 40%;
      top: 50%;
    }

    .folder--mood {
      right: 6%;
      top: 5%;
    }

    .folder--archief {
      right: 25%;
      top: 55%;
    }
  }

  /* ===================== DOUBLE-CLICK ANIM ===================== */
  @keyframes folderOpen {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
    100% { transform: scale(0.9); opacity: 0; }
  }

  .folder.opening {
    animation: folderOpen 0.3s ease forwards;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="desktop">
  <!-- BLUE PANEL -->
  <div class="blue-panel">
    <div class="lang-switch" id="langSwitch">
      <button data-lang="en">EN</button>
      <span class="lang-sep">/</span>
      <button data-lang="nl" class="active">NL</button>
      <span class="lang-sep">/</span>
      <button data-lang="fr">FR</button>
    </div>
    <div class="hero-title">FRONTALstudio</div>
  </div>

  <!-- TAGLINE -->
  <div class="tagline-bar">
    <div class="tagline-text" data-i18n="tagline">INDEPENDENT MUSIC STUDIO BASED IN BRUSSELS</div>
  </div>

  <!-- DESKTOP AREA -->
  <div class="desktop-area" id="desktopArea">

    <!-- STUDIO FOLDER -->
    <a class="folder folder--studio" href="#" data-page="studio" ondblclick="openFolder(this, 'studio')">
      <div class="folder-icon">
        <svg viewBox="0 0 56 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 12C2 10.9 2.9 10 4 10H20L24 4H52C53.1 4 54 4.9 54 6V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V12Z" fill="#c8960a"/>
          <path d="M2 16H54V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V16Z" fill="#f0c628"/>
          <path d="M2 16H54V20H2V16Z" fill="#f5d44a" opacity="0.6"/>
        </svg>
      </div>
      <span class="folder-label">STUDIO</span>
    </a>

    <!-- CONTACT FOLDER -->
    <a class="folder folder--contact" href="#" data-page="contact" ondblclick="openFolder(this, 'contact')">
      <div class="folder-icon">
        <svg viewBox="0 0 56 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 12C2 10.9 2.9 10 4 10H20L24 4H52C53.1 4 54 4.9 54 6V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V12Z" fill="#c8960a"/>
          <path d="M2 16H54V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V16Z" fill="#f0c628"/>
          <path d="M2 16H54V20H2V16Z" fill="#f5d44a" opacity="0.6"/>
        </svg>
      </div>
      <span class="folder-label">CONTACT</span>
    </a>

    <!-- MOOD APP -->
    <a class="folder folder--mood" href="#" data-page="mood" ondblclick="openFolder(this, 'mood')">
      <div class="folder-icon">
        <svg viewBox="0 0 56 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 12C2 10.9 2.9 10 4 10H20L24 4H52C53.1 4 54 4.9 54 6V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V12Z" fill="#c8960a"/>
          <path d="M2 16H54V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V16Z" fill="#f0c628"/>
          <path d="M2 16H54V20H2V16Z" fill="#f5d44a" opacity="0.6"/>
        </svg>
      </div>
      <span class="folder-label">MOOD_app.zip</span>
    </a>

    <!-- ARCHIEF FOLDER -->
    <a class="folder folder--archief" href="#" data-page="archief" ondblclick="openFolder(this, 'archief')">
      <div class="folder-icon">
        <svg viewBox="0 0 56 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 12C2 10.9 2.9 10 4 10H20L24 4H52C53.1 4 54 4.9 54 6V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V12Z" fill="#c8960a"/>
          <path d="M2 16H54V42C54 43.1 53.1 44 52 44H4C2.9 44 2 43.1 2 42V16Z" fill="#f0c628"/>
          <path d="M2 16H54V20H2V16Z" fill="#f5d44a" opacity="0.6"/>
        </svg>
      </div>
      <span class="folder-label">ARCHIEF</span>
    </a>

  </div>
</div>

<script>
  // ===================== i18n =====================
  const T = {
    en: { tagline: 'INDEPENDENT MUSIC STUDIO BASED IN BRUSSELS' },
    nl: { tagline: 'ONAFHANKELIJKE MUZIEKSTUDIO IN BRUSSEL' },
    fr: { tagline: 'STUDIO DE MUSIQUE INDÉPENDANT BASÉ À BRUXELLES' }
  };

  let lang = 'en';

  function detect() {
    const b = (navigator.language || 'en').toLowerCase();
    if (b.startsWith('nl')) return 'nl';
    if (b.startsWith('fr')) return 'fr';
    return 'en';
  }

  function setLang(l) {
    lang = l;
    const t = T[l];
    document.documentElement.lang = l;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (t[k] !== undefined) el.textContent = t[k];
    });
    document.querySelectorAll('.lang-switch button').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === l);
    });
  }

  setLang(detect());

  document.getElementById('langSwitch').addEventListener('click', e => {
    if (e.target.tagName === 'BUTTON') setLang(e.target.getAttribute('data-lang'));
  });

  // ===================== FOLDER INTERACTION =====================
  // Single click = select, double click = open
  let selectedFolder = null;

  document.querySelectorAll('.folder').forEach(folder => {
    folder.addEventListener('click', (e) => {
      e.preventDefault();
      // Deselect previous
      if (selectedFolder) selectedFolder.classList.remove('selected');
      // Select this one
      folder.classList.add('selected');
      selectedFolder = folder;
    });
  });

  // Click on empty desktop area = deselect
  document.getElementById('desktopArea').addEventListener('click', (e) => {
    if (e.target.id === 'desktopArea' || e.target === e.currentTarget) {
      if (selectedFolder) {
        selectedFolder.classList.remove('selected');
        selectedFolder = null;
      }
    }
  });

  function openFolder(el, page) {
    el.classList.add('opening');
    setTimeout(() => {
      window.location.href = page + '.html';
    }, 300);
  }

  // Prevent default on folder links
  document.querySelectorAll('.folder').forEach(f => {
    f.addEventListener('dblclick', (e) => {
      e.preventDefault();
    });
  });
</script>

</body>
</html>
