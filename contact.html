<nav class="nav">

<main class="main">
  <div class="container">
    <div id="formView">
      <h1>Kom in contact</h1>

      <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="daa76dc8-ff10-4465-8014-1fcecd9fa16d">
        <input type="hidden" name="subject" value="Frontalstudio - Nieuwe vraag.">
        <input type="hidden" name="from_name" value="FRONTALstudio Website">
        <input type="checkbox" name="botcheck" style="display:none">

        <div class="form-group">
          <label>Naam</label>
          <input type="text" name="name" required="" placeholder="Je naam">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required="" placeholder="je@email.com">
        </div>
        <div class="form-group">
          <label>Specifiek *</label>
          <select name="service">
            <option value="" disabled="" selected="">Kies een optie</option>
            <option value="Recording sessie">Recording sessie</option>
            <option value="Mixing">Mixing</option>
            <option value="Studio huur (zelfstandig)">Studio huur (zelfstandig)</option>
            <option value="Workshop / masterclass">Workshop / masterclass</option>
            <option value="1-op-1 mentoring">1-op-1 mentoring</option>
            <option value="Anders">Anders</option>
          </select>
        </div>
        <div class="form-group">
          <label>Bericht</label>
          <textarea name="message" required="" placeholder=""></textarea>
        </div>

        <button type="submit" class="submit">Verstuur</button>
      </form>

      <div class="info">
        <div class="info-row">
          <div class="info-block">
            <div class="info-label">Email</div>
            <div class="info-value large"><a href="mailto:frontalstudiobxl@gmail.com">frontalstudiobxl@gmail.com</a></div>
          </div>
          <div class="info-block">
            <div class="info-label">Locatie</div>
            <div class="info-value">Anspachlaan 77<br>1000 Brussel</div>
          </div>
          <div class="info-block">
            <div class="info-label">Socials</div>
            <div class="info-value"><a href="https://instagram.com/frontalstudio" target="_blank">Instagram</a></div>
          </div>
        </div>
      </div>
    </div>

    <div class="success" id="successView">
      <h2>Verstuurd.</h2>
      <p>We nemen zo snel mogelijk contact op.</p>
    </div>
  </div>
</main>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();
  var form = this;
  var data = new FormData(form);
  fetch(form.action, {method:"POST", body:data})
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (d.success) {
        document.getElementById("formView").style.display = "none";
        document.getElementById("successView").style.display = "block";
      }
    });
});
</script>
